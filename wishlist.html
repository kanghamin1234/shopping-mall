<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Luxury Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfdfd;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        .wishlist-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        h2 { text-align: center; margin-bottom: 40px; font-size: 2.5rem; }
        .wishlist-item { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 20px 0; }
        .wishlist-item:last-child { border-bottom: none; }
        .wishlist-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 4px; margin-right: 20px; }
        .item-details { flex-grow: 1; }
        .item-details h4 { margin: 0 0 10px; }
        .item-price { font-weight: bold; font-size: 1.2rem; color: #555; }
        .item-actions { display: flex; flex-direction: column; gap: 10px; min-width: 120px; }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: #e0c280; color: #333; }
        .remove-btn { background-color: #a13d3d; }
        .remove-btn:hover { background-color: #8a3333; color: white; }
        
        .empty-wishlist, .back-link { text-align: center; margin-top: 20px; display: block; color: #666; text-decoration: none; transition: color 0.3s ease; }
        .back-link:hover { color: #e0c280; }
    </style>
</head>
<body>
    <div class="wishlist-container">
        <h2>My Wishlist</h2>
        <div id="wishlist-items-list">
            <!-- Wishlist items will be dynamically inserted here -->
        </div>
        <a href="mypage.html" class="back-link">Back to My Page</a>
    </div>

    <script>
        const currentUser = localStorage.getItem('currentUser');
        const wishlistItemsList = document.getElementById('wishlist-items-list');
        const allProducts = JSON.parse(localStorage.getItem('products')) || [];

        window.onload = function() {
            if (!currentUser) {
                alert('Please log in to view your wishlist.');
                location.href = 'login.html';
                return;
            }
            renderWishlist();
        };

        function renderWishlist() {
            const wishlistIds = JSON.parse(localStorage.getItem('wishlist_' + currentUser)) || [];
            wishlistItemsList.innerHTML = '';

            if (wishlistIds.length === 0) {
                wishlistItemsList.innerHTML = '<p class="empty-wishlist">Your wishlist is empty.</p>';
                return;
            }

            const wishlistItems = wishlistIds.map(id => allProducts.find(p => p.id === id)).filter(p => p);

            wishlistItems.forEach(item => {
                wishlistItemsList.innerHTML += `
                    <div class="wishlist-item" id="wishlist-item-${item.id}">
                        <a href="product_detail.html?id=${item.id}">
                            <img src="${item.img}" alt="${item.name}">
                        </a>
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <p class="item-price">$${item.price.toLocaleString()}</p>
                        </div>
                        <div class="item-actions">
                            <button class="btn" onclick="addToCart('${item.id}')">Add to Cart</button>
                            <button class="btn remove-btn" onclick="removeFromWishlist('${item.id}')">Remove</button>
                        </div>
                    </div>
                `;
            });
        }

        function removeFromWishlist(productId) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist_' + currentUser)) || [];
            const updatedWishlist = wishlist.filter(id => id !== productId);
            localStorage.setItem('wishlist_' + currentUser, JSON.stringify(updatedWishlist));
            
            // Re-render the list
            renderWishlist();
        }

        function addToCart(productId) {
            const productToAdd = allProducts.find(p => p.id === productId);
            let cart = JSON.parse(localStorage.getItem('cart_' + currentUser)) || [];
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...productToAdd, quantity: 1 });
            }

            localStorage.setItem('cart_' + currentUser, JSON.stringify(cart));
            alert('Successfully added to cart!');
            
            // Optional: remove from wishlist after adding to cart
            if (confirm("Item added to cart. Do you want to remove it from your wishlist?")) {
                removeFromWishlist(productId);
            }
        }
    </script>
</body>
</html>
